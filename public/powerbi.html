  --accent-hover:  #C21F38;
  --accent-press:  #A91A30;

  --warning: #F79009;

function Slider({ children, basis = "clamp(258px, 82%, 340px)" }) {
  const ref = usePbiRef(null);
  const nudge = (d) => { const el = ref.current; if (el) el.scrollBy({ left: d * Math.min(el.clientWidth * 0.85, 720), behavior: "smooth" }); };
  const kids = React.Children.toArray(children);
  return (
    <div style={{ position: "relative" }}>
      <div ref={ref} className="slider-track" style={{ display: "flex", gap: 14, overflowX: "auto", scrollSnapType: "x mandatory" }}>
        {kids.map((ch, i) => (<div key={i} style={{ flex: `0 0 ${basis}`, scrollSnapAlign: "start", display: "flex" }}>{ch}</div>))}
      </div>
      <button className="slider-arrow slider-prev" aria-label="Previous" onClick={() => nudge(-1)}><Icon name="arrow-left" size={20} strokeWidth={2} /></button>
      <button className="slider-arrow slider-next" aria-label="Next" onClick={() => nudge(1)}><Icon name="arrow-right" size={20} strokeWidth={2} /></button>
    </div>
  );
}

                <span style={{ fontFamily: "var(--font-body)", fontWeight: 800, fontSize: 40, letterSpacing: "-0.02em", color: "#fff" }}>{initials(t.name)}</span>
              </div>
              <div style={{ position: "absolute", left: 28, bottom: 26, zIndex: 2, fontFamily: "var(--font-body)", fontWeight: 800, fontSize: 13, letterSpacing: "0.16em", textTransform: "uppercase", color: "rgba(234,241,251,0.7)", fontVariantNumeric: "tabular-nums" }}>

<script type="text/babel">
const { useState, useEffect } = React;
  function useReveal(view){useEffect(()=>{const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;const all=[...document.querySelectorAll("[data-reveal], [data-bento] > *")];const vh=window.innerHeight;const hidden=new Set();if(!reduce){all.forEach((el)=>{if(el.getBoundingClientRect().top>=vh*0.9){el.style.opacity="0";el.style.transform="translateY(24px)";el.style.willChange="opacity, transform";hidden.add(el);}});}const reveal=(el)=>{if(!hidden.has(el))return;hidden.delete(el);el.style.transition="opacity 0.7s cubic-bezier(.16,1,.3,1), transform 0.7s cubic-bezier(.16,1,.3,1)";requestAnimationFrame(()=>{el.style.opacity="1";el.style.transform="none";});};const force=(el)=>{if(!hidden.has(el))return;hidden.delete(el);el.style.transition="none";el.style.opacity="1";el.style.transform="none";};let io;if("IntersectionObserver" in window){io=new IntersectionObserver((entries)=>{entries.forEach((e)=>{if(e.isIntersecting){io.unobserve(e.target);reveal(e.target);}});},{threshold:0.1,rootMargin:"0px 0px -7% 0px"});hidden.forEach((el)=>io.observe(el));}const sweep=()=>{[...hidden].forEach((el)=>{if(el.getBoundingClientRect().top<vh*0.92)reveal(el);});};window.addEventListener("scroll",sweep,{passive:true});window.addEventListener("resize",sweep,{passive:true});const t1=setTimeout(sweep,300);const t2=setTimeout(()=>[...hidden].forEach(force),2500);return()=>{io&&io.disconnect();clearTimeout(t1);clearTimeout(t2);window.removeEventListener("scroll",sweep);window.removeEventListener("resize",sweep);};},[view]);}
  function useGsap(view){useEffect(()=>{const g=window.gsap,ST=window.ScrollTrigger;if(!g||!ST)return;if(matchMedia("(prefers-reduced-motion: reduce)").matches)return;if(!matchMedia("(min-width: 861px)").matches)return;try{g.registerPlugin(ST);}catch(e){}const imgs=g.utils.toArray("[data-parallax]");const tw=imgs.map((el)=>g.fromTo(el,{yPercent:-6},{yPercent:6,ease:"none",scrollTrigger:{trigger:el.closest("[data-parallax-wrap]")||el,start:"top bottom",end:"bottom top",scrub:0.6}}));const r=()=>{try{ST.refresh();}catch(e){}};window.addEventListener("load",r);const t=setTimeout(r,700);return()=>{tw.forEach((x)=>{x.scrollTrigger&&x.scrollTrigger.kill();x.kill();});window.removeEventListener("load",r);clearTimeout(t);};},[view]);}
  function App(){const [view,setView]=useState("home");useEffect(()=>{window.scrollTo(0,0);},[view]);useReveal(view);useGsap(view);
    return (<React.Fragment>{view==="home"?(<React.Fragment>
      <Nav onNavigate={setView}/><Hero onNavigate={setView}/><Stats/><WhatIsPowerBI/><DashboardsWeBuild/><Integrations/><Process/><Comparison/><WhyUs/><Training onNavigate={setView}/><MeetGeorge onNavigate={setView}/><CaseStudy onNavigate={setView}/><Testimonials/><FAQ/><ContactSection/><CTA onNavigate={setView}/><Footer onNavigate={setView}/>
    </React.Fragment>):(<Contact onNavigate={setView}/>)}</React.Fragment>);}
  ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
